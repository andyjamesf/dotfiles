# Prefix (troca Ctrl+B por Ctrl+A)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Melhor responsividade
set -sg escape-time 0

# Mouse ON (muito importante)
set -g mouse on

# Split mais intuitivo
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Navegação estilo Vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config rápido
bind r source-file ~/.tmux.conf \; display "Config recarregada!"

# Status bar bonita
set -g status-bg black
set -g status-fg white

set -g status-left " #S "
set -g status-right " %H:%M | %d-%m-%Y "

# Cores 256
set -g default-terminal "screen-256color"

# Numeração de janelas começa em 1
set -g base-index 1
setw -g pane-base-index 1

# Atalhos rápidos
bind-key c new-window
bind-key x kill-pane
bind-key & kill-window
# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Inicializar TPM
run '~/.tmux/plugins/tpm/tpm'
# Navegação integrada com Neovim
set -g @plugin 'christoomey/vim-tmux-navigator'

# Melhor terminal
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'

# Abrir nvim rápido
bind-key e new-window -n "nvim" "nvim"
